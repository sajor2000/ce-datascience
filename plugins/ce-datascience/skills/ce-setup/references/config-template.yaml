# ce-datascience -- local config
# Copy to .ce-datascience/config.local.yaml in your project root.
# All settings are optional. Uncomment and edit only what you need.

# --- Stack profile ---
# Configure your preferred language, IDE, libraries, and reporting tools.
# Run /ce-setup to set these interactively.

# stack_profile:
#   language: python           # r | python | both

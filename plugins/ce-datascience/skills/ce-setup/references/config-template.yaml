#   data_libraries:
#     r: [tidyverse]           # tidyverse | data.table
#     python: [pandas]         # pandas | polars
#   data_layer: parquet        # parquet | database | fabric
#   statistical_packages:
#     r: [stats, survival]     # stats | survival | lme4
#     python: [scipy]          # scipy | statsmodels | scikit-learn
#   reporting: jupyter         # quarto | rmarkdown | marimo | jupyter

